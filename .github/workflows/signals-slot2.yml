name: crypto-signals-slot2
# Дополнительные окна запуска (смещение +5 мин) — GitHub чаще пропускает */15.

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
    - cron: "7,22,37,52 * * * *"
    - cron: "3,18,33,48 * * * *"

permissions:
  contents: write

concurrency:
  group: crypto-signals
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: cp .env.ci .env

      - name: Scan market and send signals
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
          COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scan_ci.py

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          git add -f state/cooldown.json state/last_scan.json trades.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Нет изменений состояния."
          else
            git commit -m "chore: update signal state [skip ci]"
            git push
          fi
